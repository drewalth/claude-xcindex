name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: macos-14
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            mcp/swift-service/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('mcp/swift-service/Package.resolved', 'mcp/swift-service/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: ./build.sh

      - name: Swift tests
        working-directory: mcp/swift-service
        run: swift test --parallel

  release:
    name: release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: >
          npx
          --package semantic-release
          --package @semantic-release/exec
          --package @semantic-release/changelog
          --package @semantic-release/git
          --package conventional-changelog-conventionalcommits
          -- semantic-release
