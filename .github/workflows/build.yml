name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            service/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('service/Package.resolved', 'service/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: ./build.sh

      - name: Swift tests
        working-directory: service
        run: swift test --parallel

  release:
    name: release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx
          --package semantic-release
          --package @semantic-release/exec
          --package conventional-changelog-conventionalcommits
          -- semantic-release

      - name: Detect release
        id: detect
        run: |
          if [[ -f .release-version ]]; then
            version=$(cat .release-version | tr -d '[:space:]')
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "Published v$version"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No release published"
          fi

      - name: Build universal binary
        if: steps.detect.outputs.published == 'true'
        working-directory: service
        run: |
          swift build -c release --arch arm64 --arch x86_64
          binary=".build/apple/Products/Release/xcindex"
          if [[ ! -f "$binary" ]]; then
            echo "ERROR: universal binary not found at $binary" >&2
            find .build -type f -name xcindex >&2
            exit 1
          fi
          lipo -info "$binary"
          codesign -s - --force --options runtime "$binary"
          codesign -dvv "$binary" 2>&1
          cp "$binary" "$RUNNER_TEMP/xcindex"

      - name: Upload binary to release
        if: steps.detect.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.detect.outputs.tag }}" \
            "$RUNNER_TEMP/xcindex" --clobber
