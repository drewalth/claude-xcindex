name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: SwiftFormat (check)
        run: swiftformat --lint .

  build:
    name: build & test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            service/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('service/Package.resolved', 'service/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Build (release)
        run: ./build.sh

      - name: Swift tests
        working-directory: service
        run: swift test --parallel

      - name: Enforce canary coverage thresholds
        # The CoverageHarnessTests suite writes tests/coverage/coverage-summary.json
        # during `swift test`. Gate the build on aggregate recall so a regression
        # in plan_rename's range-collection path blocks the merge instead of
        # silently dropping canary coverage.
        run: |
          summary="tests/coverage/coverage-summary.json"
          if [[ ! -f "$summary" ]]; then
            echo "ERROR: $summary was not produced by the test run." >&2
            exit 1
          fi
          recall=$(python3 -c "import json,sys; print(json.load(open('$summary'))['aggregate']['recall'])")
          precision=$(python3 -c "import json,sys; print(json.load(open('$summary'))['aggregate']['precision'])")
          echo "Canary recall:    $recall"
          echo "Canary precision: $precision"
          python3 -c "import sys; sys.exit(0 if float('$recall') >= 1.0 else 1)" \
            || { echo "ERROR: canary recall regressed below 1.0" >&2; exit 1; }
          python3 -c "import sys; sys.exit(0 if float('$precision') >= 1.0 else 1)" \
            || { echo "ERROR: canary precision regressed below 1.0" >&2; exit 1; }

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: tests/coverage/coverage-summary.json
          if-no-files-found: error

  external-coverage:
    # Matrix over external SwiftPM fixtures pinned under
    # tests/fixtures/<name>/<name>.json. Each matrix leg fetches the
    # pinned SHA, builds it through SwiftPM, and runs the fixture's
    # CoverageHarness suite. Checkout + scratch build are cached on
    # the pinned SHA so warm runs stay under a minute even for TCA.
    name: fixture (${{ matrix.name }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tca
            suite: TCACoverageHarness
            summary: tests/coverage/tca-coverage-summary.json
          - name: swift-log
            suite: SwiftLogCoverageHarness
            summary: tests/coverage/swift-log-coverage-summary.json
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Read fixture pin
        id: pin
        run: |
          fixture_json="tests/fixtures/${{ matrix.name }}/${{ matrix.name }}.json"
          sha=$(python3 -c "import json; print(json.load(open('$fixture_json'))['upstream']['sha'])")
          tag=$(python3 -c "import json; print(json.load(open('$fixture_json'))['upstream']['tag'])")
          env_key=$(echo '${{ matrix.name }}' | tr '[:lower:]-' '[:upper:]_')_FIXTURE_DIR
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "env_key=$env_key" >> "$GITHUB_OUTPUT"
          echo "Pinned ${{ matrix.name }} $tag ($sha) — env var: $env_key"

      - name: Cache fixture checkout + scratch build
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/claude-xcindex/${{ matrix.name }}-${{ steps.pin.outputs.tag }}
            /var/folders/**/xcindex-${{ matrix.name }}-build
          key: ${{ matrix.name }}-${{ runner.os }}-${{ steps.pin.outputs.sha }}
          restore-keys: |
            ${{ matrix.name }}-${{ runner.os }}-

      - name: Cache SwiftPM build (xcindex)
        uses: actions/cache@v5
        with:
          path: |
            service/.build
            ~/Library/Caches/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('service/Package.resolved', 'service/Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Fetch fixture at pinned SHA
        run: scripts/fetch-fixture.sh ${{ matrix.name }}

      - name: Run fixture coverage harness
        working-directory: service
        env:
          # <NAME>_FIXTURE_DIR. Mirrors the convention scripts/fetch-fixture.sh
          # emits on stdout so the Swift harness finds the checkout.
          FIXTURE_DIR: /Users/runner/Library/Caches/claude-xcindex/${{ matrix.name }}-${{ steps.pin.outputs.tag }}
        run: |
          export ${{ steps.pin.outputs.env_key }}="$FIXTURE_DIR"
          swift test --filter ${{ matrix.suite }}

      - name: Enforce verified-symbol recall + floor
        # Every fixture must carry at least MIN_VERIFIED curated entries
        # (needs_verification=false with non-empty expected_ranges) so
        # the harness stays a real signal rather than an empty
        # auto-pass. Stub entries (needs_verification=true) are still
        # allowed but do not count toward the floor.
        run: |
          summary="${{ matrix.summary }}"
          if [[ ! -f "$summary" ]]; then
            echo "ERROR: $summary was not produced by the ${{ matrix.name }} run." >&2
            exit 1
          fi
          SUMMARY_PATH="$summary" MIN_VERIFIED=1 FIXTURE_NAME="${{ matrix.name }}" python3 - <<'PY'
          import json, os, sys
          min_verified = int(os.environ["MIN_VERIFIED"])
          fixture_name = os.environ["FIXTURE_NAME"]
          data = json.load(open(os.environ["SUMMARY_PATH"]))
          per_symbol = data.get("per_symbol", [])
          if not per_symbol:
              print(f"ERROR: {fixture_name} coverage summary has no per_symbol entries.", file=sys.stderr)
              sys.exit(1)
          verified = [s for s in per_symbol if not s["needs_verification"]]
          if len(verified) < min_verified:
              print(
                  f"ERROR: {fixture_name} has {len(verified)} verified "
                  f"symbol(s); need at least {min_verified}. "
                  "Curate one entry (set needs_verification=false and fill "
                  f"expected_ranges) in tests/fixtures/{fixture_name}/{fixture_name}.json.",
                  file=sys.stderr,
              )
              sys.exit(1)
          failures = [s for s in verified if s["recall"] < 1.0]
          for s in failures:
              print(f"{data['fixture']} verified symbol {s['symbol_query']!r}: recall={s['recall']}, missing={s['false_negatives']}")
          sys.exit(1 if failures else 0)
          PY

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-coverage-summary
          path: ${{ matrix.summary }}
          if-no-files-found: error

  release:
    name: release
    needs: [build, lint, external-coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          npx
          --package semantic-release
          --package @semantic-release/exec
          --package conventional-changelog-conventionalcommits
          -- semantic-release

      - name: Detect release
        id: detect
        run: |
          if [[ -f .release-version ]]; then
            version=$(cat .release-version | tr -d '[:space:]')
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "Published v$version"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No release published"
          fi

      - name: Build universal binary
        if: steps.detect.outputs.published == 'true'
        working-directory: service
        run: |
          swift build -c release --arch arm64 --arch x86_64
          binary=".build/apple/Products/Release/xcindex"
          if [[ ! -f "$binary" ]]; then
            echo "ERROR: universal binary not found at $binary" >&2
            find .build -type f -name xcindex >&2
            exit 1
          fi
          lipo -info "$binary"
          codesign -s - --force --options runtime "$binary"
          codesign -dvv "$binary" 2>&1
          cp "$binary" "$RUNNER_TEMP/xcindex"

      - name: Upload binary to release
        if: steps.detect.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.detect.outputs.tag }}" \
            "$RUNNER_TEMP/xcindex" --clobber
